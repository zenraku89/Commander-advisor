<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0a0e14" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Commander Advisor" />
  <meta name="description" content="Analizza, valuta e costruisci mazzi Commander EDH con suggerimenti EDHREC e prezzi Cardmarket EUR" />
  <title>Commander Advisor</title>

  <!-- PWA Manifest inline -->
  <link rel="manifest" href="data:application/manifest+json,{
    %22name%22:%22Commander%20Advisor%22,
    %22short_name%22:%22CMD%20Advisor%22,
    %22description%22:%22Analizza%20e%20costruisci%20mazzi%20Commander%20EDH%22,
    %22start_url%22:%22.%22,
    %22display%22:%22standalone%22,
    %22background_color%22:%22%230a0e14%22,
    %22theme_color%22:%22%230a0e14%22,
    %22orientation%22:%22portrait%22,
    %22icons%22:[{%22src%22:%22data:image/svg+xml,%3Csvg%20xmlns%3D'http%3A//www.w3.org/2000/svg'%20viewBox%3D'0%200%20192%20192'%3E%3Crect%20width%3D'192'%20height%3D'192'%20rx%3D'32'%20fill%3D'%230a0e14'/%3E%3Ctext%20x%3D'96'%20y%3D'130'%20text-anchor%3D'middle'%20font-size%3D'110'%3E%E2%9A%94%3C/text%3E%3C/svg%3E%22,%22sizes%22:%22192x192%22,%22type%22:%22image/svg+xml%22}]
  }" />

  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0a0e14; color: #d4c5a0; font-family: Georgia, 'Times New Roman', serif; -webkit-tap-highlight-color: transparent; }
    body { overflow-x: hidden; }
    #root { min-height: 100vh; }
    textarea, input { -webkit-appearance: none; appearance: none; }
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0a0e14; }
    ::-webkit-scrollbar-thumb { background: #1e2d3d; border-radius: 2px; }

    /* Install banner */
    #install-banner {
      display: none;
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 999;
      background: #141e28; border-top: 1px solid #c8a84b;
      padding: 0.8rem 1rem;
      flex-direction: column; gap: 0.5rem;
      box-shadow: 0 -4px 20px rgba(0,0,0,0.5);
    }
    #install-banner.visible { display: flex; }
    .install-banner-row { display: flex; align-items: center; justify-content: space-between; gap: 0.8rem; }
    .install-btn {
      background: #c8a84b; color: #0a0e14; border: none;
      border-radius: 6px; padding: 0.5rem 1rem;
      font-family: Georgia, serif; font-size: 0.82rem; font-weight: 700;
      cursor: pointer; white-space: nowrap;
    }
    .install-dismiss {
      background: transparent; color: #5a6a7a; border: 1px solid #1e2d3d;
      border-radius: 6px; padding: 0.5rem 0.8rem;
      font-family: Georgia, serif; font-size: 0.78rem; cursor: pointer;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Install Banner -->
  <div id="install-banner">
    <div class="install-banner-row">
      <div style="font-size:0.82rem; color:#d4c5a0; line-height:1.4">
        ⚔ <strong style="color:#c8a84b">Installa Commander Advisor</strong><br>
        <span style="font-size:0.73rem; color:#5a6a7a">Aggiungilo alla home per usarlo come app</span>
      </div>
      <div style="display:flex; gap:0.4rem">
        <button class="install-dismiss" onclick="dismissInstall()">No</button>
        <button class="install-btn" onclick="doInstall()">Installa</button>
      </div>
    </div>
  </div>

  <script>
    // PWA Install prompt
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('install-banner').classList.add('visible');
    });
    function doInstall() {
      if (deferredPrompt) {
        deferredPrompt.prompt();
        deferredPrompt.userChoice.then(() => { deferredPrompt = null; dismissInstall(); });
      }
    }
    function dismissInstall() {
      document.getElementById('install-banner').classList.remove('visible');
    }

    // Service Worker for offline support
    if ('serviceWorker' in navigator) {
      const swCode = `
        const CACHE = 'cmd-advisor-v1';
        self.addEventListener('install', e => {
          e.waitUntil(caches.open(CACHE).then(c => c.addAll(['.'])));
          self.skipWaiting();
        });
        self.addEventListener('fetch', e => {
          if (e.request.url.includes('api.anthropic.com')) return;
          e.respondWith(caches.match(e.request).then(r => r || fetch(e.request)));
        });
      `;
      const blob = new Blob([swCode], { type: 'application/javascript' });
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).catch(() => {});
    }
  </script>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── Storage (localStorage per PWA) ───────────────────────────────────────
    const STORAGE_KEY = "mtg_collection_v2";
    const API_KEY_STORAGE = "mtg_api_key";

    function loadCollection() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "[]"); } catch { return []; }
    }
    function saveCollection(cards) {
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(cards)); } catch {}
    }
    function loadApiKey() {
      try { return localStorage.getItem(API_KEY_STORAGE) || ""; } catch { return ""; }
    }
    function saveApiKey(k) {
      try { localStorage.setItem(API_KEY_STORAGE, k); } catch {}
    }

    // ── Claude API ────────────────────────────────────────────────────────────
    async function askClaude(apiKey, systemPrompt, userMessage) {
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "x-api-key": apiKey,
          "anthropic-version": "2023-06-01",
          "anthropic-dangerous-direct-browser-access": "true",
        },
        body: JSON.stringify({
          model: "claude-opus-4-5",
          max_tokens: 2000,
          system: systemPrompt,
          messages: [{ role: "user", content: userMessage }],
        }),
      });
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.error?.message || `Errore API: ${res.status}`);
      }
      const data = await res.json();
      const text = data.content?.find(c => c.type === "text")?.text || "";
      return text.replace(/```json[\s\S]*?```/g, m => m.slice(7, -3)).replace(/```/g, "").trim();
    }

    // ── Prompts ───────────────────────────────────────────────────────────────
    const EVAL_PROMPT = `Sei un esperto di Magic: The Gathering Commander (EDH) e conosci EDHREC.
Ricevi una lista di carte di un mazzo Commander e devi:
1. Identificare il commander.
2. Valutare il mazzo su questi assi (1-10): Coerenza, Velocità, Resistenza, Interazione, Valore.
3. Identificare i punti deboli principali (max 3).
4. Suggerire fino a 6 upgrade: carte da AGGIUNGERE (max 20€ su Cardmarket EUR) sostituendo carte del mazzo (vendite totali max 150€).
5. Sinergie EDHREC più comuni per questo commander.

Rispondi SOLO con JSON valido:
{
  "commander": "Nome",
  "scores": {"coerenza":7,"velocita":5,"resistenza":6,"interazione":4,"valore":6},
  "punti_deboli": ["...", "..."],
  "sinergie_edhrec": ["sinergia1", "sinergia2", "sinergia3"],
  "upgrades": [
    {"aggiungi":"Card","prezzo_aggiungi":3.50,"rimuovi":"Card","prezzo_rimuovi":0.20,"motivazione":"..."}
  ],
  "note_generali": "..."
}`;

    const BUILD_PROMPT = `Sei un esperto di Magic: The Gathering Commander (EDH) e conosci EDHREC.
Costruisci un mazzo Commander da 100 carte (incluso commander) ottimizzato, nel budget indicato (Cardmarket EUR).
Se ricevi una collezione, prioritizza quelle carte trattandole a costo 0.

Rispondi SOLO con JSON valido:
{
  "commander": "Nome",
  "colori": ["G","U"],
  "descrizione_strategia": "...",
  "categorie": {
    "commander": ["Nome"],
    "creature": ["carta1",...],
    "istantanei": [...],
    "stregonerie": [...],
    "artefatti": [...],
    "incantesimi": [...],
    "terre": [...]
  },
  "costo_stimato_eur": 85.0,
  "note": "..."
}`;

    // ── Colors ────────────────────────────────────────────────────────────────
    const C = {
      bg: "#0a0e14", surface: "#111820", border: "#1e2d3d",
      accent: "#c8a84b", accentDim: "#8a6f2a",
      blue: "#4a9eff", green: "#3dba6e", red: "#e05252",
      text: "#d4c5a0", muted: "#5a6a7a", card: "#141e28",
    };

    // ── Sub-components ────────────────────────────────────────────────────────
    function ScoreBar({ label, value }) {
      const color = value >= 7 ? C.green : value >= 5 ? C.accent : C.red;
      return (
        <div style={{ marginBottom: "0.5rem" }}>
          <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 3 }}>
            <span style={{ fontSize: "0.73rem", color: C.muted, textTransform: "uppercase", letterSpacing: "0.05em" }}>{label}</span>
            <span style={{ fontSize: "0.8rem", color, fontWeight: "700" }}>{value}/10</span>
          </div>
          <div style={{ background: C.border, borderRadius: 3, height: 6, overflow: "hidden" }}>
            <div style={{ width: `${value * 10}%`, height: "100%", background: color, borderRadius: 3, transition: "width 0.6s ease" }} />
          </div>
        </div>
      );
    }

    function Spinner() {
      return (
        <div style={{ display: "flex", alignItems: "center", gap: "0.6rem", color: C.muted, fontSize: "0.82rem", padding: "0.8rem 0" }}>
          <div style={{ width: 16, height: 16, border: `2px solid ${C.border}`, borderTop: `2px solid ${C.accent}`, borderRadius: "50%", animation: "spin 0.8s linear infinite" }} />
          Elaborazione in corso…
        </div>
      );
    }

    function Tag({ children, color = C.blue, bg = "#1a2a3a" }) {
      return (
        <span style={{ background: bg, color, border: `1px solid ${color}33`, borderRadius: 4, padding: "0.18rem 0.45rem", fontSize: "0.72rem", display: "inline-block" }}>
          {children}
        </span>
      );
    }

    // ── API Key Setup ─────────────────────────────────────────────────────────
    function ApiKeySetup({ onSave }) {
      const [key, setKey] = useState("");
      return (
        <div style={{ padding: "1.5rem", maxWidth: 480, margin: "0 auto" }}>
          <div style={{ textAlign: "center", marginBottom: "1.5rem" }}>
            <div style={{ fontSize: "2.5rem", marginBottom: "0.5rem" }}>⚔</div>
            <h1 style={{ color: C.accent, fontSize: "1.4rem", fontWeight: "700" }}>Commander Advisor</h1>
            <p style={{ color: C.muted, fontSize: "0.78rem", marginTop: "0.3rem" }}>EDH · Cardmarket EUR</p>
          </div>
          <div style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 10, padding: "1.2rem" }}>
            <p style={{ fontSize: "0.82rem", color: C.text, marginBottom: "1rem", lineHeight: 1.6 }}>
              Per usare questa app hai bisogno di una <strong style={{ color: C.accent }}>API Key Anthropic</strong>.<br />
              Viene salvata solo sul tuo dispositivo.
            </p>
            <label style={{ fontSize: "0.72rem", color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: "0.4rem" }}>
              API Key
            </label>
            <input
              type="password"
              value={key}
              onChange={e => setKey(e.target.value)}
              placeholder="sk-ant-api03-..."
              style={{ width: "100%", background: C.card, border: `1px solid ${C.border}`, borderRadius: 6, color: C.text, fontFamily: "monospace", fontSize: "0.78rem", padding: "0.6rem 0.8rem", outline: "none", marginBottom: "0.8rem" }}
            />
            <button
              onClick={() => { if (key.trim()) { saveApiKey(key.trim()); onSave(key.trim()); } }}
              disabled={!key.trim()}
              style={{ width: "100%", background: key.trim() ? C.accent : C.border, color: key.trim() ? C.bg : C.muted, border: "none", borderRadius: 6, padding: "0.65rem", fontFamily: "inherit", fontSize: "0.85rem", fontWeight: "700", cursor: key.trim() ? "pointer" : "default" }}
            >
              Inizia →
            </button>
            <p style={{ fontSize: "0.7rem", color: C.muted, marginTop: "0.8rem", lineHeight: 1.5 }}>
              Ottieni la tua chiave su <strong style={{ color: C.accent }}>console.anthropic.com</strong>
            </p>
          </div>
        </div>
      );
    }

    // ── Main App ──────────────────────────────────────────────────────────────
    function App() {
      const [apiKey, setApiKey] = useState(() => loadApiKey());
      const [tab, setTab] = useState("valuta");
      const [loading, setLoading] = useState(false);
      const [collection, setCollection] = useState(() => loadCollection());
      const [collectionInput, setCollectionInput] = useState(() => loadCollection().join("\n"));

      // Valuta
      const [deckInput, setDeckInput] = useState("");
      const [evalResult, setEvalResult] = useState(null);
      const [evalError, setEvalError] = useState(null);

      // Costruisci
      const [commanderName, setCommanderName] = useState("");
      const [budget, setBudget] = useState("80");
      const [useCollection, setUseCollection] = useState(false);
      const [buildResult, setBuildResult] = useState(null);
      const [buildError, setBuildError] = useState(null);

      if (!apiKey) return <ApiKeySetup onSave={setApiKey} />;

      const handleEval = async () => {
        if (!deckInput.trim()) return;
        setLoading(true); setEvalResult(null); setEvalError(null);
        try {
          const raw = await askClaude(apiKey, EVAL_PROMPT, `Mazzo:\n${deckInput}`);
          setEvalResult(JSON.parse(raw));
        } catch (e) {
          setEvalError(e.message || "Errore nell'analisi. Controlla la API key e la lista.");
        }
        setLoading(false);
      };

      const handleBuild = async () => {
        if (!commanderName.trim()) return;
        setLoading(true); setBuildResult(null); setBuildError(null);
        try {
          const collNote = useCollection && collection.length > 0
            ? `\n\nCOLLEZIONE (tratta queste carte a costo 0):\n${collection.slice(0, 200).join("\n")}`
            : "";
          const raw = await askClaude(apiKey, BUILD_PROMPT, `Commander: ${commanderName}\nBudget: ${budget}€${collNote}`);
          setBuildResult(JSON.parse(raw));
        } catch (e) {
          setBuildError(e.message || "Errore nella costruzione.");
        }
        setLoading(false);
      };

      const handleSaveCollection = () => {
        const cards = collectionInput.split("\n").map(l => l.trim()).filter(Boolean);
        setCollection(cards);
        saveCollection(cards);
      };

      const handleImportDeck = () => {
        const newCards = deckInput.split("\n").map(l => l.replace(/^\d+\s+/,"").trim()).filter(Boolean);
        const merged = [...new Set([...collection, ...newCards])];
        setCollection(merged);
        setCollectionInput(merged.join("\n"));
        saveCollection(merged);
        alert(`✓ ${newCards.length} carte aggiunte alla collezione`);
      };

      // Styles
      const tabStyle = (active) => ({
        flex: 1, padding: "0.7rem 0.4rem",
        background: active ? C.accent : C.surface,
        color: active ? C.bg : C.muted,
        border: "none", borderBottom: active ? "none" : `1px solid ${C.border}`,
        cursor: "pointer", fontFamily: "inherit", fontSize: "0.7rem",
        fontWeight: active ? "700" : "400", letterSpacing: "0.05em",
        textTransform: "uppercase", transition: "all 0.15s",
      });

      const btn = (variant = "primary", disabled = false) => ({
        background: disabled ? C.border : variant === "primary" ? C.accent : variant === "danger" ? "#5a1a1a" : C.surface,
        color: disabled ? C.muted : variant === "primary" ? C.bg : variant === "danger" ? C.red : C.text,
        border: `1px solid ${disabled ? C.border : variant === "primary" ? C.accent : variant === "danger" ? C.red : C.border}`,
        borderRadius: 6, padding: "0.55rem 1rem",
        cursor: disabled ? "default" : "pointer",
        fontFamily: "inherit", fontSize: "0.8rem", fontWeight: "600",
        letterSpacing: "0.04em",
      });

      const inputStyle = {
        width: "100%", background: C.card, border: `1px solid ${C.border}`,
        borderRadius: 6, color: C.text, fontFamily: "inherit",
        fontSize: "0.85rem", padding: "0.6rem 0.8rem", outline: "none",
      };

      const renderUpgrade = (u, i) => {
        const profit = (u.prezzo_rimuovi || 0) - (u.prezzo_aggiungi || 0);
        return (
          <div key={i} className="fade-in" style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "0.85rem", marginBottom: "0.6rem" }}>
            <div style={{ display: "flex", gap: "0.4rem", flexWrap: "wrap", marginBottom: "0.4rem" }}>
              <Tag color={C.green} bg="#1a3a1a">+ {u.aggiungi}</Tag>
              <span style={{ color: C.muted, fontSize: "0.72rem", alignSelf: "center" }}>→</span>
              <Tag color={C.red} bg="#3a1a1a">− {u.rimuovi}</Tag>
            </div>
            <div style={{ display: "flex", gap: "1rem", marginBottom: "0.4rem", flexWrap: "wrap" }}>
              <span style={{ fontSize: "0.73rem", color: C.muted }}>Costo: <strong style={{ color: C.accent }}>€{(u.prezzo_aggiungi||0).toFixed(2)}</strong></span>
              <span style={{ fontSize: "0.73rem", color: C.muted }}>Vendi: <strong style={{ color: profit >= 0 ? C.green : C.red }}>€{(u.prezzo_rimuovi||0).toFixed(2)}</strong></span>
              {profit > 0 && <span style={{ fontSize: "0.73rem", color: C.green }}>+€{profit.toFixed(2)} netto</span>}
            </div>
            <p style={{ fontSize: "0.77rem", color: C.text, margin: 0, lineHeight: 1.5 }}>{u.motivazione}</p>
          </div>
        );
      };

      const renderCategory = (label, cards) => {
        if (!cards?.length) return null;
        return (
          <div style={{ marginBottom: "0.9rem" }} key={label}>
            <div style={{ fontSize: "0.68rem", color: C.accent, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "0.35rem", fontWeight: "700" }}>
              {label} <span style={{ color: C.muted }}>({cards.length})</span>
            </div>
            <div style={{ display: "flex", flexWrap: "wrap", gap: "0.25rem" }}>
              {cards.map((c, i) => (
                <span key={i} style={{ background: C.surface, border: `1px solid ${C.border}`, borderRadius: 4, padding: "0.18rem 0.45rem", fontSize: "0.72rem", color: C.text }}>
                  {c}
                </span>
              ))}
            </div>
          </div>
        );
      };

      return (
        <div style={{ minHeight: "100vh", background: C.bg, paddingBottom: "5rem" }}>
          {/* Header */}
          <div style={{ background: C.surface, borderBottom: `1px solid ${C.border}`, padding: "0.9rem 1rem 0" }}>
            <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", marginBottom: "0.7rem" }}>
              <div>
                <h1 style={{ fontSize: "1.1rem", color: C.accent, fontWeight: "700", margin: 0 }}>⚔ Commander Advisor</h1>
                <p style={{ fontSize: "0.68rem", color: C.muted, margin: 0 }}>EDH · EDHREC · Cardmarket EUR</p>
              </div>
              <button onClick={() => { saveApiKey(""); setApiKey(""); }}
                style={{ background: "transparent", border: `1px solid ${C.border}`, borderRadius: 4, color: C.muted, fontSize: "0.65rem", padding: "0.3rem 0.5rem", cursor: "pointer", fontFamily: "inherit" }}>
                🔑 API
              </button>
            </div>
            {/* Tabs */}
            <div style={{ display: "flex", gap: "0.2rem" }}>
              {[["valuta","🔍 Valuta"],["costruisci","🏗 Costruisci"],["collezione","📦 Collezione"]].map(([id, label]) => (
                <button key={id} onClick={() => setTab(id)} style={tabStyle(tab === id)}>{label}</button>
              ))}
            </div>
          </div>

          {/* Content */}
          <div style={{ padding: "1rem", maxWidth: 600, margin: "0 auto" }}>

            {/* ── VALUTA ── */}
            {tab === "valuta" && (
              <div className="fade-in">
                <p style={{ fontSize: "0.78rem", color: C.muted, marginBottom: "0.8rem", lineHeight: 1.5 }}>
                  Incolla la lista del mazzo (una carta per riga). Il commander viene rilevato automaticamente.
                </p>
                <textarea
                  value={deckInput}
                  onChange={e => setDeckInput(e.target.value)}
                  placeholder={"Zimone, Infinite Analyst\n1 Sol Ring\n1 Hardened Scales\n..."}
                  style={{ ...inputStyle, fontFamily: "monospace", fontSize: "0.76rem", minHeight: 140, resize: "vertical", marginBottom: "0.7rem" }}
                />
                <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap", marginBottom: "1rem" }}>
                  <button onClick={handleEval} disabled={loading || !deckInput.trim()} style={btn("primary", loading || !deckInput.trim())}>
                    {loading ? "Analisi…" : "⚡ Analizza"}
                  </button>
                  <button onClick={handleImportDeck} disabled={!deckInput.trim()} style={btn("secondary", !deckInput.trim())}>
                    + Salva in Collezione
                  </button>
                </div>

                {loading && <Spinner />}
                {evalError && (
                  <div style={{ background: "#2a0f0f", border: `1px solid ${C.red}44`, borderRadius: 8, padding: "0.8rem", fontSize: "0.78rem", color: C.red, marginBottom: "1rem" }}>
                    ⚠ {evalError}
                  </div>
                )}

                {evalResult && (
                  <div className="fade-in">
                    {/* Commander */}
                    <div style={{ background: C.card, border: `1px solid ${C.accentDim}`, borderRadius: 8, padding: "0.9rem", marginBottom: "0.8rem" }}>
                      <div style={{ fontSize: "0.65rem", color: C.accentDim, textTransform: "uppercase", letterSpacing: "0.1em" }}>Commander</div>
                      <div style={{ fontSize: "1rem", color: C.accent, fontWeight: "700", marginBottom: "0.5rem" }}>{evalResult.commander}</div>
                      {evalResult.sinergie_edhrec?.length > 0 && (
                        <>
                          <div style={{ fontSize: "0.65rem", color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em", marginBottom: "0.3rem" }}>Sinergie EDHREC</div>
                          <div style={{ display: "flex", flexWrap: "wrap", gap: "0.25rem" }}>
                            {evalResult.sinergie_edhrec.map((s, i) => <Tag key={i}>{s}</Tag>)}
                          </div>
                        </>
                      )}
                    </div>

                    {/* Scores */}
                    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "0.9rem", marginBottom: "0.8rem" }}>
                      <div style={{ fontSize: "0.65rem", color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "0.7rem" }}>Valutazione</div>
                      {Object.entries(evalResult.scores || {}).map(([k, v]) => <ScoreBar key={k} label={k} value={v} />)}
                    </div>

                    {/* Punti deboli */}
                    {evalResult.punti_deboli?.length > 0 && (
                      <div style={{ background: "#1a0f0f", border: `1px solid ${C.red}33`, borderRadius: 8, padding: "0.9rem", marginBottom: "0.8rem" }}>
                        <div style={{ fontSize: "0.65rem", color: C.red, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "0.5rem" }}>Punti Deboli</div>
                        {evalResult.punti_deboli.map((p, i) => (
                          <div key={i} style={{ fontSize: "0.78rem", color: C.text, marginBottom: "0.25rem" }}>⚠ {p}</div>
                        ))}
                      </div>
                    )}

                    {/* Upgrades */}
                    {evalResult.upgrades?.length > 0 && (
                      <div style={{ marginBottom: "0.8rem" }}>
                        <div style={{ fontSize: "0.65rem", color: C.green, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "0.5rem", fontWeight: "700" }}>
                          Upgrade Suggeriti · max €20/carta · max €150 vendite
                        </div>
                        {evalResult.upgrades.map(renderUpgrade)}
                        <div style={{ background: "#0a1a0a", border: `1px solid ${C.green}33`, borderRadius: 6, padding: "0.5rem 0.8rem", fontSize: "0.75rem", color: C.muted }}>
                          Costo totale: <strong style={{ color: C.accent }}>€{evalResult.upgrades.reduce((s,u)=>s+(u.prezzo_aggiungi||0),0).toFixed(2)}</strong>
                          &nbsp;·&nbsp;Ricavo: <strong style={{ color: C.green }}>€{evalResult.upgrades.reduce((s,u)=>s+(u.prezzo_rimuovi||0),0).toFixed(2)}</strong>
                        </div>
                      </div>
                    )}

                    {/* Note */}
                    {evalResult.note_generali && (
                      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "0.9rem", fontSize: "0.78rem", color: C.text, lineHeight: 1.6 }}>
                        <div style={{ fontSize: "0.65rem", color: C.muted, textTransform: "uppercase", letterSpacing: "0.1em", marginBottom: "0.4rem" }}>Note</div>
                        {evalResult.note_generali}
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* ── COSTRUISCI ── */}
            {tab === "costruisci" && (
              <div className="fade-in">
                <p style={{ fontSize: "0.78rem", color: C.muted, marginBottom: "0.8rem", lineHeight: 1.5 }}>
                  Inserisci il commander e il budget. Il mazzo viene costruito seguendo le sinergie EDHREC più efficaci.
                </p>
                <label style={{ fontSize: "0.68rem", color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: "0.3rem" }}>Nome Commander</label>
                <input value={commanderName} onChange={e => setCommanderName(e.target.value)}
                  placeholder="es. Zimone, Infinite Analyst" style={{ ...inputStyle, marginBottom: "0.7rem" }} />

                <label style={{ fontSize: "0.68rem", color: C.muted, textTransform: "uppercase", letterSpacing: "0.08em", display: "block", marginBottom: "0.3rem" }}>Budget totale (€)</label>
                <input value={budget} onChange={e => setBudget(e.target.value)}
                  type="number" min="20" max="2000"
                  style={{ ...inputStyle, width: 100, color: C.accent, fontWeight: "700", marginBottom: "0.7rem" }} />

                {collection.length > 0 && (
                  <label style={{ display: "flex", alignItems: "center", gap: "0.5rem", fontSize: "0.78rem", color: C.text, cursor: "pointer", marginBottom: "0.8rem" }}>
                    <input type="checkbox" checked={useCollection} onChange={e => setUseCollection(e.target.checked)} style={{ accentColor: C.accent }} />
                    Usa collezione ({collection.length} carte) — costo 0
                  </label>
                )}

                <button onClick={handleBuild} disabled={loading || !commanderName.trim()} style={btn("primary", loading || !commanderName.trim())}>
                  {loading ? "Costruzione…" : "🏗 Costruisci Mazzo"}
                </button>

                {loading && <Spinner />}
                {buildError && <div style={{ background: "#2a0f0f", border: `1px solid ${C.red}44`, borderRadius: 8, padding: "0.8rem", fontSize: "0.78rem", color: C.red, marginTop: "0.8rem" }}>⚠ {buildError}</div>}

                {buildResult && (
                  <div className="fade-in" style={{ marginTop: "1rem" }}>
                    <div style={{ background: C.card, border: `1px solid ${C.accentDim}`, borderRadius: 8, padding: "0.9rem", marginBottom: "0.8rem" }}>
                      <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                        <div>
                          <div style={{ fontSize: "0.65rem", color: C.accentDim, textTransform: "uppercase", letterSpacing: "0.1em" }}>Commander</div>
                          <div style={{ fontSize: "1rem", color: C.accent, fontWeight: "700" }}>{buildResult.commander}</div>
                          <div style={{ fontSize: "0.73rem", color: C.muted }}>{(buildResult.colori||[]).join(" · ")}</div>
                        </div>
                        <div style={{ background: "#0a1a0a", border: `1px solid ${C.green}33`, borderRadius: 6, padding: "0.35rem 0.7rem", textAlign: "right" }}>
                          <div style={{ fontSize: "0.65rem", color: C.muted }}>Costo</div>
                          <div style={{ fontSize: "1rem", color: C.green, fontWeight: "700" }}>€{buildResult.costo_stimato_eur?.toFixed(2)||"—"}</div>
                        </div>
                      </div>
                      {buildResult.descrizione_strategia && (
                        <p style={{ fontSize: "0.77rem", color: C.text, margin: "0.6rem 0 0", lineHeight: 1.5 }}>{buildResult.descrizione_strategia}</p>
                      )}
                    </div>

                    <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "0.9rem" }}>
                      {buildResult.categorie && [
                        ["Commander", buildResult.categorie.commander],
                        ["Creature", buildResult.categorie.creature],
                        ["Istantanei", buildResult.categorie.istantanei],
                        ["Stregonerie", buildResult.categorie.stregonerie],
                        ["Artefatti", buildResult.categorie.artefatti],
                        ["Incantesimi", buildResult.categorie.incantesimi],
                        ["Terre", buildResult.categorie.terre],
                      ].map(([label, cards]) => renderCategory(label, cards))}
                    </div>

                    {buildResult.note && (
                      <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "0.8rem", marginTop: "0.7rem", fontSize: "0.77rem", color: C.muted, lineHeight: 1.6 }}>
                        {buildResult.note}
                      </div>
                    )}
                  </div>
                )}
              </div>
            )}

            {/* ── COLLEZIONE ── */}
            {tab === "collezione" && (
              <div className="fade-in">
                <div style={{ background: "#0a1a0a", border: `1px solid ${C.green}33`, borderRadius: 6, padding: "0.55rem 0.9rem", marginBottom: "0.8rem", fontSize: "0.78rem", color: C.green }}>
                  📦 {collection.length} carte salvate
                </div>
                <p style={{ fontSize: "0.78rem", color: C.muted, marginBottom: "0.7rem", lineHeight: 1.5 }}>
                  Una carta per riga. Vengono usate come costo 0 nel tab Costruisci.
                </p>
                <textarea
                  value={collectionInput}
                  onChange={e => setCollectionInput(e.target.value)}
                  placeholder={"Sol Ring\nCommand Tower\nHardened Scales\n..."}
                  style={{ ...inputStyle, fontFamily: "monospace", fontSize: "0.76rem", minHeight: 200, resize: "vertical", marginBottom: "0.7rem" }}
                />
                <div style={{ display: "flex", gap: "0.5rem", flexWrap: "wrap" }}>
                  <button onClick={handleSaveCollection} style={btn("primary")}>💾 Salva</button>
                  <button onClick={() => { setCollection([]); setCollectionInput(""); saveCollection([]); }} style={btn("danger")}>🗑 Svuota</button>
                </div>
                <div style={{ background: C.card, border: `1px solid ${C.border}`, borderRadius: 8, padding: "0.9rem", marginTop: "1rem", fontSize: "0.76rem", color: C.muted, lineHeight: 1.7 }}>
                  <strong style={{ color: C.text }}>Come funziona:</strong><br />
                  • In <strong style={{ color: C.accent }}>Valuta</strong> → "Salva in Collezione" importa il mazzo<br />
                  • In <strong style={{ color: C.accent }}>Costruisci</strong> spunta "Usa collezione" per risparmiare sul budget<br />
                  • I dati sono salvati su questo dispositivo
                </div>
              </div>
            )}
          </div>

          <p style={{ fontSize: "0.65rem", color: C.muted, textAlign: "center", padding: "0 1rem 1rem" }}>
            Prezzi indicativi Cardmarket EUR · Verifica su cardmarket.com
          </p>
        </div>
      );
    }

    ReactDOM.render(<App />, document.getElementById('root'));
  </script>
</body>
</html>
